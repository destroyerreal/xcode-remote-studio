name: 🍎 macOS Terminal Remote Session

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: 'Xcode Version (e.g., latest, 15.4)'
        required: true
        default: 'latest'

jobs:
  macos-terminal:
    name: 🍎 macOS Terminal Session
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: 📋 Display System Information
        run: |
          echo "============================================"
          echo "   🖥️  Xcode Remote Studio - Terminal Mode"
          echo "============================================"
          echo ""
          echo "🍎 macOS Version: $(sw_vers -productVersion)"
          echo "💻 Hardware: $(sysctl -n hw.model 2>/dev/null || echo 'VM')"
          echo "🧠 CPU: $(sysctl -n machdep.cpu.brand_string)"
          echo "💾 RAM: $(( $(sysctl -n hw.memsize) / 1073741824 )) GB"
          echo "💿 Disk: $(df -h / | tail -1 | awk '{print $4}') free"
          echo ""
          echo "============================================"

      - name: 📦 Checkout Repository
        uses: actions/checkout@v5

      - name: 🔧 Select Xcode Version
        run: |
          if [ "${{ github.event.inputs.xcode_version }}" = "latest" ]; then
            echo "Using default (latest) Xcode installation: $(xcode-select -p)"
          else
            XCODE_PATH="/Applications/Xcode_${{ github.event.inputs.xcode_version }}.app"
            if [ -d "$XCODE_PATH" ]; then
              sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
              echo "✅ Switched to Xcode ${{ github.event.inputs.xcode_version }}"
            else
              echo "⚠️ Xcode version ${{ github.event.inputs.xcode_version }} not found. Using default."
            fi
          fi
          echo "Current Xcode version:"
          xcodebuild -version

      - name: 🚀 Start Terminal Session (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
